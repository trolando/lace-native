name: CI

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Lint ──────────────────────────────────────────
  lint:
    name: 'Lint'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Clippy
      run: cargo clippy --all-targets -- -D warnings

  # ── Linux ─────────────────────────────────────────
  linux:
    name: 'Linux ${{ matrix.name }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: 'default features',    features: '',                            }
          - { name: 'stats',               features: '--features lace-native/stats',    }
          - { name: 'no backoff',          features: '--no-default-features',       }
          - { name: 'stats + no backoff',  features: '--no-default-features --features lace-native/stats', }
          - { name: 'hwloc',              features: '--features lace-native/hwloc',     install: 'libhwloc-dev', }
          - { name: 'all features',        features: '--features lace-native/stats,lace-native/hwloc', install: 'libhwloc-dev', }
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable

    - name: Install system dependencies
      if: matrix.install
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ matrix.install }}

    - name: Build (debug)
      run: cargo build ${{ matrix.features }}

    - name: Build (release)
      run: cargo build --release ${{ matrix.features }}

    - name: Test
      run: cargo test --release ${{ matrix.features }}

    - name: Verify fib example
      run: |
        result=$(cargo run --release -p lace-example-fib ${{ matrix.features }} -- -w 1 20 2>&1 | grep "^Result:")
        echo "$result"
        echo "$result" | grep -q "fib(20) = 6765"

    - name: Verify nqueens example
      run: |
        result=$(cargo run --release -p lace-example-nqueens ${{ matrix.features }} -- -w 1 10 2>&1 | grep "^Result:")
        echo "$result"
        echo "$result" | grep -q "nqueens(10) = 724"

  # ── macOS ─────────────────────────────────────────
  macos:
    name: 'macOS ${{ matrix.name }}'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: 'default features', features: '',                         }
          - { name: 'stats',            features: '--features lace-native/stats', }
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable

    - name: Build (release)
      run: cargo build --release ${{ matrix.features }}

    - name: Test
      run: cargo test --release ${{ matrix.features }}

    - name: Verify fib example
      run: |
        result=$(cargo run --release -p lace-example-fib ${{ matrix.features }} -- -w 1 20 2>&1 | grep "^Result:")
        echo "$result"
        echo "$result" | grep -q "fib(20) = 6765"

    - name: Verify nqueens example
      run: |
        result=$(cargo run --release -p lace-example-nqueens ${{ matrix.features }} -- -w 1 10 2>&1 | grep "^Result:")
        echo "$result"
        echo "$result" | grep -q "nqueens(10) = 724"

  # ── Windows ───────────────────────────────────────
  windows:
    name: 'Windows ${{ matrix.name }}'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: 'MSVC default',  features: '',                         }
          - { name: 'MSVC stats',    features: '--features lace-native/stats', }
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable

    - name: Build (release)
      run: cargo build --release ${{ matrix.features }}

    - name: Test
      run: cargo test --release ${{ matrix.features }}

    - name: Verify fib example
      shell: bash
      run: |
        result=$(cargo run --release -p lace-example-fib ${{ matrix.features }} -- -w 1 20 2>&1 | grep "^Result:")
        echo "$result"
        echo "$result" | grep -q "fib(20) = 6765"

    - name: Verify nqueens example
      shell: bash
      run: |
        result=$(cargo run --release -p lace-example-nqueens ${{ matrix.features }} -- -w 1 10 2>&1 | grep "^Result:")
        echo "$result"
        echo "$result" | grep -q "nqueens(10) = 724"

  # ── LACE_DIR override ─────────────────────────────
  # Verify that building against a Lace checkout works
  lace-dir:
    name: 'Linux LACE_DIR override'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable

    - name: Clone Lace
      run: git clone https://github.com/trolando/lace.git /tmp/lace

    - name: Build with LACE_DIR
      env:
        LACE_DIR: /tmp/lace
      run: cargo build --release

    - name: Test with LACE_DIR
      env:
        LACE_DIR: /tmp/lace
      run: cargo test --release

    - name: Verify fib
      env:
        LACE_DIR: /tmp/lace
      run: |
        result=$(cargo run --release -p lace-example-fib -- -w 1 20 2>&1 | grep "^Result:")
        echo "$result"
        echo "$result" | grep -q "fib(20) = 6765"

  # ── MSRV ──────────────────────────────────────────
  msrv:
    name: 'MSRV (Rust 1.70)'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@1.70.0

    - name: Build core crates
      run: cargo build -p lace-native -p lace-native-build

    - name: Build fib example
      run: cargo build -p lace-example-fib

    - name: Test fib
      run: |
        cargo run -p lace-example-fib -- -w 1 20 2>&1 | grep -q "fib(20) = 6765"
